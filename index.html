<!DOCTYPE html>
<html>
<head>
    <title>Class Time Table</title>
    <style>
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

<table>

    <!-- Title Row -->
    <tr>
        <th colspan="6">Class Time Table</th>
    </tr>

    <!-- Days Row -->
    <tr>
        <th></th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <!-- First Two Rows with Hours -->
    <tr>
        <td rowspan="2"><b>Hours</b></td>
        <td>Web Engineering</td>
        <td>AI</td>
        <td>Database</td>
        <td>AI</td>
        <td>English</td>
    </tr>

    <tr>
        <td>OOP</td>
        <td>Data Structures</td>
        <td>Web Engineering</td>
        <td>OOP</td>
        <td>Islamic Studies</td>
    </tr>

    <!-- Lunch Row -->
    <tr>
        <td colspan="6"><b>LUNCH</b></td>
    </tr>

    <!-- Last Row -->
    <tr>
        <td></td>
        <td>Machine Learning</td>
        <td>Operating Systems</td>
        <td>AI Lab</td>
        <td>Web Lab</td>
        <td>Project Work</td>
    </tr>

</table>

</body>
</html>
